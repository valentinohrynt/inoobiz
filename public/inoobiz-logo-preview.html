<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InooBiz Logo Preview</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 40px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, .06);
    }
    h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -0.03em; }
    p { color: #475569; margin: 0 0 24px; }
    svg { max-width: 100%; height: auto; display: block; }
    .icon { width: 220px; }
    .dark { background: #020617; }
    .dark h2 { color: white; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>InooBiz Logo Preview</h1>
    <p>SVG vektor editable untuk brand SaaS/digital studio.</p>

    <section class="card">
      <h2>Horizontal Logo</h2>
      <svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">InooBiz Logo - Horizontal</title>
  <desc id="desc">Editable vector logo for InooBiz, an independent SaaS and digital product studio.</desc>

  <defs>
    <linearGradient id="inoobizIconGradient" x1="48" y1="42" x2="256" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="inoobizAccentGradient" x1="91" y1="68" x2="218" y2="229" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>

    <filter id="softShadow" x="24" y="20" width="264" height="272" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1E40AF" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Icon container -->
  <g filter="url(#softShadow)">
    <rect x="48" y="40" width="224" height="224" rx="56" fill="url(#inoobizIconGradient)"/>

    <!-- Abstract solo-developer / SaaS monogram mark -->
    <path d="M108 177C108 146.624 132.624 122 163 122H210V154H166C153.297 154 143 164.297 143 177C143 189.703 153.297 200 166 200H210V232H163C132.624 232 108 207.376 108 177Z" fill="white" fill-opacity="0.96"/>
    <path d="M210 88C226.569 88 240 101.431 240 118C240 134.569 226.569 148 210 148H184V116H207C212.523 116 217 111.523 217 106C217 100.477 212.523 96 207 96H184V88H210Z" fill="url(#inoobizAccentGradient)" fill-opacity="0.98"/>
    <path d="M184 96H142C120.461 96 103 113.461 103 135V137H135V135C135 131.134 138.134 128 142 128H184V96Z" fill="white" fill-opacity="0.92"/>

    <!-- Pixel/product nodes -->
    <rect x="87" y="77" width="18" height="18" rx="5" fill="#E0F2FE"/>
    <rect x="228" y="201" width="18" height="18" rx="5" fill="#BAE6FD"/>
    <circle cx="236" cy="81" r="8" fill="#F8FAFC"/>
  </g>

  <!-- Wordmark -->
  <g>
    <text x="328" y="160" font-family="Inter, Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="88" font-weight="800" letter-spacing="-3.2" fill="#0F172A">Inoo<tspan fill="#2563EB">Biz</tspan></text>
    <text x="333" y="215" font-family="Inter, Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500" letter-spacing="3.6" fill="#64748B">INDEPENDENT DIGITAL STUDIO</text>
  </g>
</svg>

    </section>

  </g>
</svg>
</div>
